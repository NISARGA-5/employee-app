steps:

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/employee-app:$SHORT_SHA'
    - '.'

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/employee-app:$SHORT_SHA'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/employee-app:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
